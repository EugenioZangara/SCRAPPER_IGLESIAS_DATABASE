<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14315E"/>
      <stop offset="100%" stop-color="#0E2647"/>
    </linearGradient>
    <clipPath id="logoMask">
      <circle cx="160" cy="315" r="80"/>
    </clipPath>
  </defs>

  <!-- Fondo gradiente -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Franjas onduladas decorativas -->
  <path d="M0,480 C130,452 260,508 390,478 C520,448 650,502 780,474
           C910,446 1040,494 1140,468 C1170,461 1185,472 1200,466 L1200,630 L0,630 Z"
        fill="white" opacity="0.10"/>
  <path d="M0,520 C150,498 300,538 450,516 C600,494 750,532 900,512
           C1050,492 1140,522 1200,508 L1200,630 L0,630 Z"
        fill="white" opacity="0.06"/>

  <!-- Halo detrás del logo -->
  <circle cx="160" cy="315" r="88" fill="white" fill-opacity="0.12"/>

  <!-- Logo circular (referencia relativa: mismo directorio) -->
  <image href="parroguia_logo.png" x="80" y="235" width="160" height="160"
         clip-path="url(#logoMask)" preserveAspectRatio="xMidYMid meet"/>

  <!-- Título -->
  <text x="300" y="295"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-weight="bold" font-size="80" fill="white">ParroGuía</text>

  <!-- Subtítulo dorado -->
  <text x="300" y="358"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="38" fill="#F2A007">Encontrá tu próxima misa a un click</text>

  <!-- URL -->
  <text x="300" y="400"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="26" fill="rgba(255,255,255,0.6)">parroquias.com.ar</text>
</svg>
<!-- NOTA: WhatsApp, Facebook y X/Twitter no aceptan SVG para og:image.
     Convertir este archivo a og_parroguia.png con:
       python manage.py generar_og_image
     O manualmente con Inkscape / un screenshot del browser. -->
