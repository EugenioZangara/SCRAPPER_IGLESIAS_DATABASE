{% extends "iglesias/publico/base_publica.html" %}

{% block content %}
<style>
  .hero {
    text-align: center;
    padding: 48px 0 36px;
  }
  .hero h1 {
    font-size: 36px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .hero-sub {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 28px;
  }
  .search-wrap {
    position: relative;
    max-width: 560px;
    margin: 0 auto;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
    opacity: 0.5;
  }
  .search-input {
    width: 100%;
    padding: 14px 14px 14px 44px;
    font-size: 15px;
    font-family: var(--sans);
    border: 2px solid var(--rule);
    border-radius: 12px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus {
    border-color: var(--primary);
  }

  .filters {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 20px;
  }
  .filter-pill {
    display: inline-flex;
    align-items: center;
    cursor: pointer;
  }
  .filter-pill input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }
  .filter-pill-label {
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1.5px solid var(--rule);
    background: var(--paper);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .filter-pill input[type="radio"]:checked + .filter-pill-label {
    background: var(--primary-soft);
    border-color: var(--primary);
    color: var(--primary-dark);
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .htmx-indicator {
    display: none;
    font-size: 13px;
    color: var(--muted);
  }
  .htmx-request .htmx-indicator { display: inline; }
</style>

<div class="hero">
  <h1>Encontrá tu parroquia</h1>
  <p class="hero-sub">{{ total }} parroquias de la Arquidiócesis de Buenos Aires</p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input
      class="search-input"
      type="search"
      name="q"
      placeholder="Buscar por nombre, barrio, párroco o dirección..."
      autocomplete="off"
      hx-get="{% url 'iglesias:publico_buscar' %}"
      hx-trigger="keyup changed delay:300ms, search"
      hx-target="#resultados"
      hx-include="[name='filtro']:checked"
    >
  </div>

  <div class="filters">
    <label class="filter-pill">
      <input
        type="radio" name="filtro" value="todas" checked
        hx-get="{% url 'iglesias:publico_buscar' %}"
        hx-trigger="change"
        hx-target="#resultados"
        hx-include="[name='q'], [name='filtro']:checked"
      >
      <span class="filter-pill-label">Todas</span>
    </label>
    <label class="filter-pill">
      <input
        type="radio" name="filtro" value="eventos"
        hx-get="{% url 'iglesias:publico_buscar' %}"
        hx-trigger="change"
        hx-target="#resultados"
        hx-include="[name='q'], [name='filtro']:checked"
      >
      <span class="filter-pill-label">Con eventos</span>
    </label>
    <label class="filter-pill">
      <input
        type="radio" name="filtro" value="horarios"
        hx-get="{% url 'iglesias:publico_buscar' %}"
        hx-trigger="change"
        hx-target="#resultados"
        hx-include="[name='q'], [name='filtro']:checked"
      >
      <span class="filter-pill-label">Con horarios</span>
    </label>
    <label class="filter-pill">
      <input
        type="radio" name="filtro" value="redes"
        hx-get="{% url 'iglesias:publico_buscar' %}"
        hx-trigger="change"
        hx-target="#resultados"
        hx-include="[name='q'], [name='filtro']:checked"
      >
      <span class="filter-pill-label">Con redes</span>
    </label>
  </div>
</div>

<div id="resultados"></div>

<div
  hx-get="{% url 'iglesias:publico_buscar' %}"
  hx-trigger="load"
  hx-target="#resultados"
  style="display:none;"
></div>
{% endblock %}
