{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Acceso al Panel · ParroGuía</title>
  <link rel="icon" type="image/png" href="{% static 'iglesias/img/parroguia_logo.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --navy: #14315E;
      --navy-700: #1E4585;
      --gold-deep: #D98A00;
      --bg: #FBF4E4;
      --paper: #FFFFFF;
      --line: #ECE3CE;
      --ink: #15243C;
      --muted: #76859C;
      --on-navy: #FBF4E4;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --font-ui: 'Nunito', system-ui, sans-serif;
      --font-display: 'Baloo 2', 'Nunito', system-ui, sans-serif;
    }
    body {
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-box {
      background: var(--paper);
      border-radius: 20px;
      box-shadow: 0 4px 28px rgba(20,49,94,.13);
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .login-logo__icon {
      width: 52px;
      height: 52px;
      border-radius: 13px;
      object-fit: cover;
      margin: 0 auto .9rem;
      display: block;
    }
    .login-logo h1 {
      font: 800 1.25rem/1 var(--font-display);
      color: var(--navy);
      margin-bottom: .3rem;
    }
    .login-logo h1 strong { color: var(--gold-deep); }
    .login-logo p {
      font: 600 .8125rem/1.4 var(--font-ui);
      color: var(--muted);
    }
    .field { margin-bottom: 1rem; }
    label {
      display: block;
      font: 600 .75rem/1 var(--font-ui);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .35rem;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font: 600 .9rem/1 var(--font-ui);
      color: var(--ink);
      background: var(--paper);
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(20,49,94,.08);
    }
    .btn-submit {
      width: 100%;
      padding: .75rem;
      background: var(--navy);
      color: var(--on-navy);
      border: none;
      border-radius: 999px;
      font: 700 .9rem/1 var(--font-ui);
      cursor: pointer;
      margin-top: .5rem;
      transition: background .15s;
    }
    .btn-submit:hover { background: var(--navy-700); }
    .alert-error {
      background: var(--danger-soft);
      border: 1px solid #fecaca;
      color: var(--danger);
      padding: .65rem .9rem;
      border-radius: 10px;
      font: 600 .85rem/1.4 var(--font-ui);
      margin-bottom: 1rem;
    }
    .login-footer {
      margin-top: 1.5rem;
      text-align: center;
      font: 600 .8rem/1 var(--font-ui);
      color: var(--muted);
    }
    .login-footer a { color: var(--navy); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <img class="login-logo__icon" src="{% static 'iglesias/img/parroguia_logo.png' %}" alt="ParroGuía">
    <h1>Parro<strong>Guía</strong></h1>
    <p>Acceso al panel de tu parroquia</p>
  </div>

  {% if error %}
    <div class="alert-error">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-submit">Ingresar al panel</button>
  </form>

  <div class="login-footer">
    <a href="/">← Volver a ParroGuía</a>
  </div>
</div>
</body>
</html>
