<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Parroquias{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* === VARIABLES === */
    :root {
        /* New editorial palette */
        --paper:    oklch(0.975 0.008 80);
        --paper-2:  oklch(0.96  0.009 80);
        --ink:      oklch(0.20  0.015 60);
        --ink-2:    oklch(0.36  0.015 60);
        --muted:    oklch(0.55  0.012 60);
        --faint:    oklch(0.72  0.010 60);
        --rule:     oklch(0.86  0.012 60);
        --rule-2:   oklch(0.91  0.010 60);
        --accent:   #7A1F2B;
        --accent-soft: #7A1F2B22;
        --max:      1280px;
        --serif: "Newsreader", "Source Serif Pro", Georgia, serif;
        --sans:  "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --mono:  "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

        /* Legacy palette — keeps .badge, .panel, .verify-button etc. working */
        --surface:      #ffffff;
        --surface-soft: oklch(0.965 0.008 80);
        --line:         var(--rule);
        --text:         var(--ink);
        --bg:           var(--paper);
        --brand:        #276749;
        --brand-soft:   #dff3e9;
        --blue:         #255f85;
        --blue-soft:    #e1eff7;
        --amber:        #936316;
        --amber-soft:   #fff0cf;
        --red:          #9f3a38;
        --red-soft:     #fde7e7;
    }

    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
    }

    /* Grain texture */
    body::before {
        content: "";
        position: fixed; inset: 0;
        pointer-events: none;
        background-image:
            radial-gradient(rgba(80,60,30,.025) 1px, transparent 1px),
            radial-gradient(rgba(80,60,30,.018) 1px, transparent 1px);
        background-size: 3px 3px, 7px 7px;
        background-position: 0 0, 1px 2px;
        mix-blend-mode: multiply;
        z-index: 0;
    }

    /* === LAYOUT === */
    .wrap {
        position: relative; z-index: 1;
        max-width: var(--max); margin: 0 auto; padding: 0 32px;
    }

    /* === MASTHEAD === */
    .masthead {
        border-bottom: 1px solid var(--rule);
        background: linear-gradient(180deg, var(--paper) 0%, var(--paper) 70%, transparent 100%);
    }
    .masthead-inner {
        display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
        padding: 28px 0 16px;
    }
    .brand { display: flex; align-items: baseline; gap: 14px; }
    .brand-mark {
        font-family: var(--serif); font-weight: 500; font-size: 26px;
        letter-spacing: -0.01em; line-height: 1;
        color: var(--ink); text-decoration: none;
    }
    .brand-mark em { font-style: italic; color: var(--accent); }
    .brand-sub {
        font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--muted);
        padding-left: 14px; border-left: 1px solid var(--rule);
    }

    /* === NAV === */
    .nav {
        display: flex; gap: 6px; align-items: center;
        font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .nav a {
        color: var(--ink-2); text-decoration: none;
        padding: 6px 12px; border-radius: 999px;
        transition: background .15s ease, color .15s ease;
    }
    .nav a:hover { background: var(--paper-2); color: var(--ink); }
    .nav a.active { background: var(--ink); color: var(--paper); }

    /* === PAGE HEADER (lista page) === */
    .head {
        display: grid; grid-template-columns: 1fr auto; align-items: end;
        gap: 24px; padding: 56px 0 24px;
    }
    .eyebrow {
        font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--accent);
        margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }
    .eyebrow::before { content: ""; display: inline-block; width: 18px; height: 1px; background: var(--accent); }
    h1.title {
        font-family: var(--serif); font-weight: 400;
        font-size: clamp(48px, 6vw, 84px);
        line-height: 0.95; letter-spacing: -0.025em;
        margin: 0 0 14px; color: var(--ink);
    }
    h1.title em { font-style: italic; color: var(--accent); font-weight: 400; }
    .lede {
        font-family: var(--serif); font-size: 19px; line-height: 1.45;
        color: var(--ink-2); max-width: 56ch; margin: 0;
    }
    .head-meta {
        text-align: right; font-family: var(--mono); font-size: 11px;
        color: var(--muted); line-height: 1.7; letter-spacing: 0.04em;
    }
    .head-meta strong {
        display: block; font-weight: 500; font-size: 11px;
        color: var(--ink); letter-spacing: 0.1em; text-transform: uppercase;
        margin-bottom: 4px;
    }

    /* === STATS — editorial (lista page) === */
    .stats-dir {
        margin-top: 8px;
        border-top: 1px solid var(--ink);
        border-bottom: 1px solid var(--rule);
        display: grid; grid-template-columns: 1.4fr repeat(7, 1fr);
        background: var(--paper);
    }
    .stats-dir .stat {
        padding: 22px 18px 20px; border-right: 1px solid var(--rule-2);
        display: flex; flex-direction: column; gap: 10px; position: relative;
        border-radius: 0; background: transparent;
        border-top: 0; border-left: 0; border-bottom: 0;
    }
    .stats-dir .stat:last-child { border-right: 0; }
    .stats-dir .stat.lead { background: linear-gradient(180deg, transparent 0%, oklch(0.96 0.012 60) 100%); }
    .stats-dir .stat-label {
        font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--muted);
        display: flex; align-items: center; justify-content: space-between;
    }
    .stat-num {
        font-family: var(--serif); font-weight: 400; font-size: 44px;
        line-height: 0.95; letter-spacing: -0.02em; color: var(--ink);
        font-variant-numeric: tabular-nums oldstyle-nums;
    }
    .stats-dir .stat.lead .stat-num { font-size: 64px; }
    .stat-foot { font-family: var(--mono); font-size: 10.5px; color: var(--faint); font-variant-numeric: tabular-nums; }
    .stat-bar { height: 2px; background: var(--rule-2); border-radius: 1px; overflow: hidden; margin-top: 2px; }
    .stat-bar > span { display: block; height: 100%; background: var(--accent); }

    /* === STATS — card style (detalle page) === */
    .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px; margin-bottom: 18px;
    }
    .stats-wide { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
    .stat {
        background: var(--surface); border: 1px solid var(--line);
        border-radius: 8px; padding: 14px;
    }
    .stat-label { color: var(--muted); font-size: 13px; }
    .stat-value { margin-top: 6px; font-size: 24px; font-weight: 700; }

    /* === FILTERS — new style (lista page) === */
    .filters {
        margin-top: 28px;
        display: grid; grid-template-columns: 1fr auto auto auto auto;
        gap: 10px; align-items: stretch;
    }
    .search { position: relative; }
    .search input {
        width: 100%;
        background: var(--paper); border: 1px solid var(--rule); border-radius: 10px;
        padding: 13px 14px 13px 40px;
        font: 500 14px/1.2 var(--sans); color: var(--ink); outline: none;
        transition: border-color .15s ease, box-shadow .15s ease;
        min-height: unset;
    }
    .search input::placeholder { color: var(--faint); font-weight: 400; }
    .search input:focus { border-color: var(--ink); box-shadow: 0 0 0 4px oklch(0.92 0.01 60); }
    .search svg {
        position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
        width: 16px; height: 16px; color: var(--muted);
    }
    .select { position: relative; display: flex; align-items: center; }
    .select select {
        appearance: none;
        background: var(--paper); border: 1px solid var(--rule); border-radius: 10px;
        padding: 0 36px 0 14px; height: 100%; min-height: 44px;
        font: 500 13px/1 var(--sans); color: var(--ink-2);
        cursor: pointer; outline: none; transition: border-color .15s ease;
    }
    .select select:focus { border-color: var(--ink); }
    .select::after {
        content: ""; position: absolute; right: 14px; top: 50%;
        width: 7px; height: 7px;
        border-right: 1.5px solid var(--muted); border-bottom: 1.5px solid var(--muted);
        transform: translateY(-70%) rotate(45deg); pointer-events: none;
    }
    .btn-filter {
        background: var(--ink); color: var(--paper); border: 0; border-radius: 10px;
        padding: 0 20px; min-height: 44px;
        font: 500 12px/1 var(--mono); letter-spacing: 0.08em; text-transform: uppercase;
        cursor: pointer; transition: background .15s ease, transform .05s ease;
    }
    .btn-filter:hover { background: var(--accent); }
    .btn-filter:active { transform: translateY(1px); }

    /* === RESULTS ROW === */
    .results-row {
        margin-top: 18px;
        display: flex; align-items: center; justify-content: space-between;
        padding-bottom: 14px; border-bottom: 1px solid var(--ink);
    }
    .count {
        font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
        text-transform: uppercase; color: var(--muted);
    }
    .count strong { color: var(--ink); font-weight: 600; }

    /* === DIRECTORY === */
    .row {
        display: grid;
        grid-template-columns: 56px minmax(280px, 1fr) 160px 130px 180px 100px;
        align-items: center; gap: 18px; padding: 18px 0;
        border-bottom: 1px solid var(--rule-2);
        transition: background .12s ease;
    }
    .row.head-row {
        padding: 14px 0; border-bottom: 1px solid var(--rule);
        font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
        text-transform: uppercase; color: var(--muted);
    }
    .row:not(.head-row):hover {
        background: linear-gradient(90deg, transparent 0%, var(--paper-2) 30%, var(--paper-2) 70%, transparent 100%);
    }
    .cell-idx {
        font-family: var(--mono); font-size: 11px; color: var(--faint);
        font-variant-numeric: tabular-nums; align-self: start; padding-top: 6px;
    }
    .cell-name .name {
        font-family: var(--serif); font-size: 22px; font-weight: 500;
        letter-spacing: -0.01em; line-height: 1.15; color: var(--ink);
        margin: 0 0 4px; display: inline;
    }
    .cell-name .name a {
        color: inherit; text-decoration: none;
        background-image: linear-gradient(var(--accent), var(--accent));
        background-repeat: no-repeat; background-size: 0 1px; background-position: 0 100%;
        transition: background-size .25s ease;
    }
    .cell-name .name a:hover { background-size: 100% 1px; color: var(--accent); }
    .cell-name .sub {
        display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
        font-size: 12.5px; color: var(--muted); margin-top: 2px;
    }
    .cell-name .sub .ext { font-family: var(--mono); font-size: 11px; color: var(--faint); }
    .cell-name .sub .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--rule); display: inline-block; }
    .cell-name .parroco { font-style: italic; font-family: var(--serif); font-size: 13.5px; color: var(--ink-2); margin-top: 2px; }
    .tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .tag {
        font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--muted);
        padding: 2px 7px; border: 1px solid var(--rule); border-radius: 999px;
    }
    .cell-web { overflow: hidden; min-width: 0; }
    .web-link {
        display: flex; align-items: center; gap: 6px;
        font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
        color: var(--ink); text-decoration: none;
        border-bottom: 1px solid var(--accent); padding-bottom: 1px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        max-width: 100%;
    }
    .web-link svg { width: 11px; height: 11px; flex-shrink: 0; }
    .web-link:hover { color: var(--accent); text-decoration: none; }
    .web-none { font-family: var(--mono); font-size: 11px; color: var(--faint); letter-spacing: 0.04em; }
    .web-none::before {
        content: ""; display: inline-block; width: 8px; height: 1px;
        background: var(--faint); vertical-align: middle; margin-right: 6px;
    }
    .ev { font-family: var(--mono); font-size: 11px; color: var(--ink-2); letter-spacing: 0.02em; }
    .ev .num {
        font-family: var(--serif); font-size: 18px; font-weight: 500;
        color: var(--ink); display: inline-block; min-width: 18px;
    }
    .ev.zero, .ev.zero .num { color: var(--faint); }
    .glyphs { display: flex; gap: 8px; align-items: center; }
    .g {
        width: 26px; height: 26px; border-radius: 50%;
        display: inline-flex; align-items: center; justify-content: center;
        font-family: var(--mono); font-size: 10.5px; font-weight: 500;
        border: 1px solid var(--rule); color: var(--faint); background: transparent;
        transition: all .15s ease;
    }
    .g.on { color: var(--paper); background: var(--ink); border-color: var(--ink); }
    .g.on.fb { background: var(--accent); border-color: var(--accent); }
    .upd { font-family: var(--mono); font-size: 11px; color: var(--ink-2); letter-spacing: 0.02em; font-variant-numeric: tabular-nums; text-align: right; }
    .upd .time { color: var(--faint); display: block; font-size: 10.5px; margin-top: 2px; }

    /* === FOOTER === */
    footer {
        margin-top: 60px; padding: 24px 0 48px;
        border-top: 1px solid var(--rule);
        display: flex; justify-content: space-between; align-items: center;
        font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--muted);
    }

    /* === DJANGO CLASSES — detalle/partials === */
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: var(--muted); }
    .subtitle { margin: 6px 0 0; color: var(--muted); }
    .hidden-data { display: none; }

    h1 { margin: 0; font-size: 26px; line-height: 1.2; }

    .page-title {
        display: flex; justify-content: space-between; align-items: flex-start;
        gap: 20px; margin-top: 24px; margin-bottom: 18px;
    }

    .detail-grid {
        display: grid; grid-template-columns: 1.2fr 0.8fr;
        gap: 18px; align-items: start;
    }
    .panel {
        background: var(--surface); border: 1px solid var(--line);
        border-radius: 8px; overflow: hidden;
    }
    .section { padding: 16px; }
    .section + .section { border-top: 1px solid var(--line); }
    .section h2 { margin: 0; font-family: var(--serif); font-weight: 500; font-size: 22px; letter-spacing: -0.01em; color: var(--ink); }
    .section > div:first-child { padding-bottom: 10px; border-bottom: 1px solid var(--ink); }

    .fields { display: grid; grid-template-columns: 180px 1fr; gap: 10px 14px; }
    .field-label { color: var(--muted); }
    .field-value { min-width: 0; overflow-wrap: anywhere; }

    .badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 6px 12px; border-radius: 999px;
        border: 1px solid var(--rule);
        font-family: var(--mono); font-size: 10.5px;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--ink-2); background: var(--paper);
        white-space: nowrap;
    }
    .badge.ok { border-color: var(--ink); color: var(--ink); }
    .badge.ok::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .badge.warn { color: var(--faint); }
    .badge.warn::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: transparent; border: 1px solid var(--faint); }
    .badge.info { border-color: var(--accent); color: var(--accent); }
    .badge.missing { color: var(--muted); }
    .badge.missing::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }

    .redes-list { display: grid; gap: 10px; }
    .red-item { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fbfcfd; }
    .evento-item { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fbfcfd; }
    .evento-item + .evento-item { margin-top: 10px; }

    .verify-button, .reject-button {
        min-height: 22px; border-radius: 999px; padding: 0 8px;
        background: var(--surface); font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .verify-button { color: var(--brand); border: 1px solid var(--brand); }
    .reject-button { color: var(--red);   border: 1px solid var(--red);   }

    .status-marker {
        display: inline-flex; align-items: center; justify-content: center;
        width: 24px; height: 24px; border-radius: 999px;
        border: 2px solid currentColor; background: transparent;
        font-size: 11px; font-weight: 700; line-height: 1; text-decoration: none;
    }
    .status-marker.has       { color: var(--brand); }
    .status-marker.verified  { background: var(--brand); color: #fff; }
    .status-marker.no-network{ background: var(--red);   color: #fff; }
    .status-marker.pending   { color: var(--brand); }
    .status-marker.missing   { color: var(--red); }
    .red-status-stack  { display: inline-flex; flex-direction: column; align-items: center; gap: 5px; }
    .review-actions    { display: inline-flex; flex-direction: column; gap: 4px; align-items: center; }
    .review-form       { margin: 0; }

    /* === DETALLE PAGE === */
    .backbar {
        padding: 22px 0 4px;
        display: flex; align-items: center; justify-content: space-between;
        font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--muted);
    }
    .back {
        display: inline-flex; align-items: center; gap: 10px;
        text-decoration: none; color: var(--ink-2); transition: color .15s ease;
    }
    .back:hover { color: var(--accent); }
    .back .arrow { display: inline-block; width: 18px; height: 1px; background: currentColor; position: relative; }
    .back .arrow::before {
        content: ""; position: absolute; left: 0; top: -3px;
        width: 7px; height: 7px;
        border-left: 1px solid currentColor; border-bottom: 1px solid currentColor;
        transform: rotate(45deg);
    }
    .crumbs { display: flex; align-items: center; gap: 4px; }
    .fiche-head {
        padding: 18px 0 28px;
        display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: flex-end;
    }
    .fiche-head h1.title { font-size: clamp(56px, 8vw, 96px); }
    .sub-loc {
        font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.18em;
        text-transform: uppercase; color: var(--muted);
        display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    }
    .sub-loc .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--rule); display: inline-block; }
    .sub-loc b { color: var(--ink); font-weight: 500; }
    .fiche-num { font-family: var(--mono); text-align: right; color: var(--muted); font-size: 11px; letter-spacing: 0.08em; line-height: 1.7; }
    .fiche-num .big {
        display: block; font-family: var(--serif);
        font-size: 56px; font-weight: 400;
        color: var(--ink); letter-spacing: -0.02em; line-height: 1; margin-top: 4px;
        font-variant-numeric: tabular-nums oldstyle-nums;
    }
    .fiche-num .label { text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink); font-size: 10px; font-weight: 500; }
    .meta-strip {
        margin-top: 4px;
        border-top: 1px solid var(--ink); border-bottom: 1px solid var(--rule);
        display: grid; grid-template-columns: repeat(4, 1fr); background: var(--paper);
    }
    .meta-cell {
        padding: 22px; border-right: 1px solid var(--rule-2);
        display: flex; flex-direction: column; gap: 8px;
    }
    .meta-cell:last-child { border-right: 0; }
    .meta-cell .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .meta-cell .val { font-family: var(--serif); font-size: 36px; line-height: 1; color: var(--ink); letter-spacing: -0.015em; font-variant-numeric: tabular-nums oldstyle-nums; }
    .meta-cell .val.italic { font-style: italic; color: var(--accent); }
    .meta-cell .foot { font-family: var(--mono); font-size: 10.5px; color: var(--faint); }
    .body {
        padding: 48px 0 0;
        display: grid; grid-template-columns: 1.55fr 1fr;
        gap: 64px; align-items: start;
    }
    section.block { margin-bottom: 48px; }
    section.block:last-child { margin-bottom: 0; }
    .block-head {
        display: flex; align-items: baseline; gap: 14px;
        padding-bottom: 10px; border-bottom: 1px solid var(--ink); margin-bottom: 4px;
    }
    .block-head h2 { font-family: var(--serif); font-weight: 500; font-size: 22px; letter-spacing: -0.01em; margin: 0; color: var(--ink); }
    .block-head h2 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .block-head .num { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); margin-left: auto; }
    dl.fields { margin: 0; padding: 0; display: block; }
    dl.fields > div { display: grid; grid-template-columns: 180px 1fr; gap: 24px; padding: 14px 0; border-bottom: 1px solid var(--rule-2); align-items: baseline; }
    dl.fields > div:last-child { border-bottom: 0; }
    dl.fields dt { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 400; padding-top: 4px; }
    dl.fields dd { margin: 0; font-family: var(--serif); font-size: 19px; line-height: 1.4; color: var(--ink); letter-spacing: -0.005em; }
    dl.fields dd .mono { font-family: var(--mono); font-size: 13px; color: var(--ink-2); letter-spacing: 0.02em; }
    dl.fields dd .secondary { display: block; font-family: var(--sans); font-size: 13px; color: var(--muted); margin-top: 4px; font-style: normal; }
    dl.fields dd a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 1px; }
    dl.fields dd a:hover { color: var(--accent); }
    .empty { padding: 28px 24px; border: 1px dashed var(--rule); border-radius: 10px; background: var(--paper-2); display: flex; align-items: center; gap: 16px; color: var(--muted); }
    .empty svg { width: 22px; height: 22px; color: var(--faint); flex: none; }
    .empty .et { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--ink-2); line-height: 1.3; }
    .empty .es { display: block; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); font-style: normal; margin-top: 4px; }
    aside { position: sticky; top: 24px; }
    .social-card { margin-top: 16px; padding: 18px 18px 16px; border: 1px solid var(--rule); border-radius: 12px; background: var(--paper); transition: border-color .15s ease; }
    .social-card + .social-card { margin-top: 10px; }
    .social-card:hover { border-color: var(--ink); }
    .sc-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .sc-head .name { font-family: var(--serif); font-size: 18px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
    .sc-head .tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); padding: 3px 8px; border: 1px solid var(--accent); border-radius: 999px; }
    .sc-handle { font-family: var(--mono); font-size: 12px; color: var(--ink-2); word-break: break-all; line-height: 1.4; }
    .sc-url { margin-top: 6px; font-family: var(--mono); font-size: 10.5px; color: var(--faint); word-break: break-all; line-height: 1.5; }
    .sc-open { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; padding: 8px 12px; border: 1px solid var(--rule); border-radius: 999px; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-2); text-decoration: none; transition: all .15s ease; }
    .sc-open:hover { border-color: var(--accent); color: var(--accent); }
    .sc-open .arrow { display: inline-block; width: 6px; height: 6px; border-right: 1px solid currentColor; border-top: 1px solid currentColor; transform: rotate(45deg); }
    .actions { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .action {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: 14px 16px;
        background: var(--paper); border: 1px solid var(--rule); border-radius: 12px;
        font-family: var(--sans); font-size: 14px; color: var(--ink);
        text-decoration: none; transition: all .15s ease;
    }
    .action:hover { border-color: var(--ink); background: var(--paper-2); text-decoration: none; }
    .action .label { display: flex; flex-direction: column; gap: 2px; }
    .action .label small { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 400; }
    .action.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .action.primary small { color: rgba(250,247,240,.6); }
    .action.primary:hover { background: var(--accent); border-color: var(--accent); color: var(--paper); }
    .action .arrow { display: inline-block; width: 8px; height: 8px; border-right: 1.5px solid currentColor; border-top: 1.5px solid currentColor; transform: rotate(45deg); opacity: .7; }
    .events { margin-top: 0; }
    .events .ev-row { display: grid; grid-template-columns: 80px 1fr auto; gap: 24px; padding: 18px 0; align-items: baseline; border-bottom: 1px solid var(--rule-2); }
    .events .ev-row:last-child { border-bottom: 0; }
    .events .ev-row .date { font-family: var(--serif); font-size: 22px; color: var(--ink); letter-spacing: -0.01em; line-height: 1; }
    .events .ev-row .date small { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
    .events .ev-row .ttl { font-family: var(--serif); font-size: 17px; color: var(--ink); }
    .events .ev-row .ttl small { display: block; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }
    .events .ev-row .ev-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

    /* === FORM ELEMENTS (global — edit forms in detalle) === */
    input, select, button {
        min-height: 38px; border: 1px solid var(--line); border-radius: 6px;
        background: var(--surface); color: var(--text);
        padding: 0 10px; font: inherit;
    }
    button {
        background: var(--brand); border-color: var(--brand);
        color: #fff; cursor: pointer; font-weight: 700;
    }
    textarea {
        border: 1px solid var(--line); border-radius: 6px;
        background: var(--surface); color: var(--text);
        padding: 8px 10px; font: inherit;
    }

    /* Accordion */
    details[open] .acordeon-arrow { transform: rotate(90deg); display: inline-block; }
    .acordeon-arrow { display: inline-block; transition: transform 0.2s; }

    /* === RESPONSIVE === */
    @media (max-width: 1100px) {
        .stats-dir { grid-template-columns: 1.2fr repeat(3, 1fr); }
        .stats-dir .stat { border-bottom: 1px solid var(--rule-2); }
    }
    @media (max-width: 900px) {
        .stats       { grid-template-columns: 1fr; }
        .detail-grid { grid-template-columns: 1fr; }
        .fields      { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
        .wrap        { padding: 0 18px; }
        .head        { grid-template-columns: 1fr; }
        .head-meta   { text-align: left; }
        h1.title     { font-size: 56px; }
        .filters     { grid-template-columns: 1fr; }
        .row         { grid-template-columns: 1fr; gap: 8px; }
        .row.head-row{ display: none; }
        .page-title  { display: block; }
    }
    @media (max-width: 1024px) {
        .body { grid-template-columns: 1fr; gap: 48px; }
        aside { position: static; }
        .fiche-head { grid-template-columns: 1fr; }
        .fiche-num { text-align: left; }
    }
    @media (max-width: 760px) {
        .meta-strip { grid-template-columns: repeat(2, 1fr); }
        .meta-cell { border-bottom: 1px solid var(--rule-2); }
        dl.fields > div { grid-template-columns: 1fr; gap: 4px; }
        .events .ev-row { grid-template-columns: 60px 1fr; gap: 12px; }
        .events .ev-row .ev-actions { grid-column: 1 / -1; flex-direction: row; align-items: center; }
    }
    </style>
</head>
<body>
    <header class="masthead">
        <div class="wrap masthead-inner">
            <div class="brand">
                <a class="brand-mark" href="{% url 'iglesias:lista_parroquias' %}">Scraper <em>Católico</em></a>
                <div class="brand-sub">Buenos Aires · MMXXVI</div>
            </div>
            <nav class="nav">
                <a href="{% url 'iglesias:lista_parroquias' %}" {% if request.resolver_match.url_name == 'lista_parroquias' %}class="active"{% endif %}>Parroquias</a>
                <a href="/admin/">Admin</a>
            </nav>
        </div>
    </header>

    <main class="wrap" style="padding-bottom: 48px;">
        {% block content %}{% endblock %}
    </main>

    <footer class="wrap">
        <div>Arquidiócesis de Buenos Aires</div>
        <div>Scraper Católico</div>
    </footer>

    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</body>
</html>
