{% extends "iglesias/publico/base_publica.html" %}

{% block meta_extra %}
<title>Cerrar sesión | ParroGuía</title>
{% endblock %}

{% block content %}
<div style="max-width:400px; margin:60px auto; padding:0 24px;
            text-align:center;">
    <h1 style="font-size:22px; font-weight:600; color:#1e1b4b;
                margin-bottom:12px;">¿Cerrar sesión?</h1>
    <p style="font-size:14px; color:#6b7280; margin-bottom:24px;">
        ¿Estás seguro que querés salir de ParroGuía?
    </p>
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit"
                style="padding:10px 24px; border-radius:8px;
                       background:#4f46e5; color:white; border:none;
                       font-size:14px; font-weight:500; cursor:pointer;">
            Sí, cerrar sesión
        </button>
    </form>
    <a href="{% url 'iglesias:publico_inicio' %}"
       style="display:block; margin-top:12px; font-size:13px;
              color:#6b7280; text-decoration:none;">
        Cancelar
    </a>
</div>
{% endblock %}
