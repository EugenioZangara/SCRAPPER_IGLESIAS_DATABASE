databases:
  - name: scraper-catolico-db
    plan: free

services:
  - type: web
    name: scraper-catolico
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scraper-catolico-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: scraper-catolico.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://scraper-catolico.onrender.com
      - key: DEBUG
        value: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_SESSION_USER
        sync: false
      - key: GOOGLE_SHEETS_ID
        value: "13Rdk0iLA9GPAcmBwnFgA9Qykjz_9AcmWaXv6nzzAPfU"
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false

  - type: cron
    name: scraper-instagram
    runtime: python
    schedule: "0 6 * * 1,4"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scraper_redes.run --produccion
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scraper-catolico-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: INSTAGRAM_SESSION_USER
        sync: false
      - key: INSTAGRAM_SESSION_B64
        sync: false
